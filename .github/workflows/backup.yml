name: Weekly Backup

on:
  schedule:
    - cron: "0 6 * * 0"  # Domingo às 6h (horário UTC = 3h de Brasília)
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export all tables from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          DIR="backups/$DATE"
          mkdir -p "$DIR"

          TABLES=(
            tasks
            pendencias
            metas
            meta_checks
            projetos
            projeto_tasks
            insights
            estudos
            anotacoes_espirituais
            pedidos_oracao
            versiculos_salvos
            leitura_biblica
            estudo_estacoes
            content_refs
          )

          for TABLE in "${TABLES[@]}"; do
            echo "Backing up $TABLE..."
            curl -sS \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$SUPABASE_URL/rest/v1/$TABLE?select=*" \
              -o "$DIR/$TABLE.json"
          done

          echo "{ \"backup_date\": \"$DATE\", \"tables\": $(echo ${TABLES[@]} | jq -R 'split(" ")') }" > "$DIR/manifest.json"
          echo "Backup completo: $DIR"

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date +%Y-%m-%d)"
          git push
